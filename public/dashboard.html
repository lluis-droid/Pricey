<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/assets/logo-icon.png">
  <title>Pricey — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .servers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .server-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px 16px;
      text-align: center; text-decoration: none; color: var(--text);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      animation: fadeUp .3s ease;
    }
    .server-card:hover { border-color: var(--purple); transform: translateY(-3px); box-shadow: var(--shadow-glow); }
    .server-card img { width: 56px; height: 56px; border-radius: 16px; border: 2px solid var(--border); }
    .server-initial {
      width: 56px; height: 56px; border-radius: 16px; background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; font-family: 'Syne', sans-serif;
    }
    .server-name {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .server-tag {
      font-size: 11px; font-weight: 700; color: #a78bfa;
      background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.2);
      padding: 3px 10px; border-radius: 100px; font-family: 'Syne', sans-serif;
    }
    .add-card {
      background: transparent; border: 2px dashed var(--border); border-radius: var(--radius-lg);
      padding: 24px 16px; text-align: center; text-decoration: none; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 152px; gap: 8px; transition: border-color .2s, color .2s, transform .15s;
    }
    .add-card:hover { border-color: var(--purple); color: #a78bfa; transform: translateY(-3px); }
    .add-card svg { width: 28px; height: 28px; stroke-width: 1.5; }
    .add-card span { font-size: 13px; font-weight: 700; font-family: 'Syne', sans-serif; }
    .add-card small { font-size: 11px; }

    .section-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
      font-family: 'Syne', sans-serif;
    }

    .empty-hint {
      background: var(--surface); border: 1px dashed var(--border); border-radius: 14px;
      padding: 20px 22px; font-size: 13px; color: var(--muted); margin-top: 18px; line-height: 1.7;
    }
    .empty-hint strong { color: var(--text); }

    @media (max-width: 768px) {
      .servers-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .server-card { padding: 18px 12px; }
    }
    @media (max-width: 480px) {
      .servers-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .server-card { min-height: 0; }
    }
  </style>
</head>
<body>
<div class="glow-subtle"></div>

<nav class="nav nav-sticky">
  <div class="nav-inner">
    <div class="nav-left">
      <a href="/" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        Home
      </a>
      <div class="nav-divider"></div>
      <a href="/" class="nav-logo">
        <img src="/assets/logo-icon.png" alt="Pricey">
        <span class="nav-logo-text">Pricey</span>
      </a>
      <div class="nav-divider"></div>
      <span class="nav-page">Dashboard</span>
    </div>
    <div class="nav-right">
      <a href="/admin" id="admin-link" class="back-btn" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin
      </a>
      <div class="bot-status" id="bot-status" style="display:none">
        <span class="status-dot"></span>
        <span id="bot-tag">Online</span>
      </div>
      <div class="user-pill">
        <img id="avatar" src="" alt="">
        <span id="username">...</span>
      </div>
      <a href="/auth/logout" class="btn-logout">Logout</a>
    </div>
  </div>
</nav>

<div class="content">
  <div class="page-header">
    <h1>Your <span class="grad-text">Servers</span></h1>
    <p>Pick a server to configure Pricey. Only servers where the bot is active are shown.</p>
  </div>
  <div class="section-label">Active Servers</div>
  <div class="servers-grid" id="servers-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
const CLIENT_ID = '1505005727859605657';
const INVITE = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&permissions=8&scope=bot%20applications.commands`;
let lastSnap = null;

async function init() {
  const me = await Pricey.initAuth();
  if (!me) { location.href = '/'; return; }

  Pricey.checkAdmin();

  const status = await fetch('/api/status').then(r => r.json()).catch(() => ({online: false}));
  if (status.online) {
    document.getElementById('bot-tag').textContent = status.tag;
    document.getElementById('bot-status').style.display = 'flex';
  }

  await loadGuilds();
  setInterval(loadGuilds, 6000);
}

async function loadGuilds() {
  const data = await fetch('/api/guilds').then(r => r.json()).catch(() => null);
  if (!data) return;
  const snap = JSON.stringify((data.inBot || []).map(g => g.id).sort());
  if (snap === lastSnap) return;
  lastSnap = snap;

  const grid = document.getElementById('servers-grid');
  let html = (data.inBot || []).map(g => `
    <a class="server-card" href="/server/${g.id}">
      ${g.icon
        ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" alt="${g.name}">`
        : `<div class="server-initial">${g.name[0].toUpperCase()}</div>`}
      <div class="server-name">${g.name}</div>
      <div class="server-tag">Manage</div>
    </a>
  `).join('');

  html += `<a class="add-card" href="${INVITE}" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Add to a Server</span>
    <small>Appears automatically once the bot joins</small>
  </a>`;

  grid.innerHTML = html;

  const hasServers = (data.inBot || []).length > 0;
  let hint = document.getElementById('empty-hint');
  if (!hasServers) {
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'empty-hint';
      hint.className = 'empty-hint';
      hint.innerHTML = `<strong>No servers yet.</strong> Invite Pricey using "Add to a Server" above, then come back — it appears here automatically once the bot joins.`;
      grid.after(hint);
    }
  } else if (hint) {
    hint.remove();
  }
}

init();
</script>
</body>
</html>
