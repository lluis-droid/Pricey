<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pricey — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple:#8B5CF6; --blue:#3B82F6; --green:#84CC16;
    --bg:#080810; --surface:#0f0f1a; --surface2:#161625; --surface3:#1c1c2e;
    --border:#1e1e35; --text:#f1f5f9; --muted:#64748b;
    --grad:linear-gradient(135deg,#8B5CF6,#3B82F6);
    --grad-green:linear-gradient(135deg,#84CC16,#3B82F6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .glow{position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 70% 50% at 5% 10%,#8B5CF615,transparent),
               radial-gradient(ellipse 50% 40% at 95% 90%,#3B82F612,transparent);}

  nav{position:relative;z-index:10;background:rgba(8,8,16,0.9);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);padding:0 40px;height:60px;
    display:flex;align-items:center;justify-content:space-between;}
  .nav-left{display:flex;align-items:center;gap:12px;}
  .nav-logo{display:flex;align-items:center;gap:8px;}
  .nav-logo img{height:28px;}
  .nav-logo-text{font-family:'Syne',sans-serif;font-weight:900;font-size:18px;
    background:var(--grad);background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
  .nav-divider{width:1px;height:20px;background:var(--border);}
  .nav-page{font-size:13px;font-weight:600;color:var(--muted);font-family:'DM Sans',sans-serif;}

  .nav-right{display:flex;align-items:center;gap:12px;}
  .bot-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    color:var(--green);background:rgba(132,204,22,0.1);border:1px solid rgba(132,204,22,0.2);
    padding:5px 12px;border-radius:100px;font-family:'Syne',sans-serif;}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .user-pill{display:flex;align-items:center;gap:8px;}
  .user-pill img{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);}
  .user-pill span{font-size:13px;font-weight:600;}
  .btn-logout{font-size:12px;font-weight:700;color:#f87171;background:rgba(239,68,68,0.1);
    border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:6px 14px;text-decoration:none;}
  .btn-logout:hover{background:rgba(239,68,68,0.2);}

  .content{position:relative;z-index:1;padding:48px 40px;max-width:1200px;margin:0 auto;}

  .page-header{margin-bottom:40px;}
  .page-header h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:900;letter-spacing:-1.5px;margin-bottom:6px;}
  .page-header p{font-size:14px;color:var(--muted);}
  .grad-text{background:var(--grad);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  .servers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}

  .server-card{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:24px 16px;text-align:center;text-decoration:none;color:var(--text);
    display:flex;flex-direction:column;align-items:center;gap:10px;
    transition:border-color .2s,transform .15s,box-shadow .2s;
    animation:fadeUp .3s ease;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .server-card:hover{border-color:var(--purple);transform:translateY(-3px);box-shadow:0 12px 40px #8B5CF625;}

  .server-card img{width:56px;height:56px;border-radius:16px;border:2px solid var(--border);}
  .server-initial{width:56px;height:56px;border-radius:16px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;
    font-family:'Syne',sans-serif;}
  .server-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .server-tag{font-size:11px;font-weight:700;color:#a78bfa;background:rgba(139,92,246,0.12);
    border:1px solid rgba(139,92,246,0.2);padding:3px 10px;border-radius:100px;
    font-family:'Syne',sans-serif;}

  .add-card{
    background:transparent;border:2px dashed var(--border);border-radius:16px;
    padding:24px 16px;text-align:center;text-decoration:none;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:152px;gap:8px;transition:border-color .2s,color .2s,transform .15s;
  }
  .add-card:hover{border-color:var(--purple);color:#a78bfa;transform:translateY(-3px);}
  .add-card svg{width:28px;height:28px;stroke-width:1.5;}
  .add-card span{font-size:13px;font-weight:700;font-family:'Syne',sans-serif;}
  .add-card small{font-size:11px;}

  .skeleton{
    background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
    background-size:200% 100%;animation:shimmer 1.5s infinite;
    border-radius:16px;height:152px;border:1px solid var(--border);
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .section-label{font-size:11px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;
    font-family:'Syne',sans-serif;}
</style>
</head>
<body>
<div class="glow"></div>
<nav>
  <div class="nav-left">
    <div class="nav-logo">
      <img src="/assets/logo-icon.png" alt="Pricey">
      <span class="nav-logo-text">Pricey</span>
    </div>
    <div class="nav-divider"></div>
    <span class="nav-page">Dashboard</span>
  </div>
  <div class="nav-right">
    <div class="bot-status" id="bot-status" style="display:none">
      <span class="status-dot"></span>
      <span id="bot-tag">Online</span>
    </div>
    <div class="user-pill">
      <img id="avatar" src="">
      <span id="username">...</span>
    </div>
    <a href="/auth/logout" class="btn-logout">Logout</a>
  </div>
</nav>

<div class="content">
  <div class="page-header">
    <h1>Your <span class="grad-text">Servers</span></h1>
    <p>Select a server to configure Pricey. Only servers where the bot is active are shown.</p>
  </div>
  <div class="section-label">Active Servers</div>
  <div class="servers-grid" id="servers-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
const CLIENT_ID = '1505005727859605657';
const INVITE = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&permissions=8&scope=bot%20applications.commands`;
let lastSnap = null;

async function init() {
  const me = await fetch('/api/me').then(r=>r.json()).catch(()=>({loggedIn:false}));
  if (!me.loggedIn) { location.href='/'; return; }
  document.getElementById('username').textContent = me.user.username;
  document.getElementById('avatar').src = me.user.avatar
    ? `https://cdn.discordapp.com/avatars/${me.user.id}/${me.user.avatar}.png`
    : 'https://cdn.discordapp.com/embed/avatars/0.png';

  const status = await fetch('/api/status').then(r=>r.json()).catch(()=>({online:false}));
  if (status.online) {
    document.getElementById('bot-tag').textContent = status.tag;
    document.getElementById('bot-status').style.display = 'flex';
  }

  await loadGuilds();
  setInterval(loadGuilds, 6000);
}

async function loadGuilds() {
  const data = await fetch('/api/guilds').then(r=>r.json()).catch(()=>null);
  if (!data) return;
  const snap = JSON.stringify((data.inBot||[]).map(g=>g.id).sort());
  if (snap === lastSnap) return;
  lastSnap = snap;

  const grid = document.getElementById('servers-grid');
  let html = (data.inBot||[]).map(g => `
    <a class="server-card" href="/server/${g.id}">
      ${g.icon
        ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" alt="${g.name}">`
        : `<div class="server-initial">${g.name[0].toUpperCase()}</div>`}
      <div class="server-name">${g.name}</div>
      <div class="server-tag">Manage</div>
    </a>
  `).join('');

  html += `<a class="add-card" href="${INVITE}" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Add to a Server</span>
    <small>Updates automatically</small>
  </a>`;

  grid.innerHTML = html;
}

init();
</script>
</body>
</html>
